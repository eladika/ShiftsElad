<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מרכז יועצי השקעות - סידור עבודה</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f18; --surface:#141720; --surface2:#1c2030; --surface3:#242840;
  --border:#2a2f4a; --accent:#4f8ef7; --accent2:#7c6af7;
  --text:#e8eaf6; --text2:#8a93c8; --text3:#4a5280;
  --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}
.header{background:linear-gradient(135deg,#161925,#1e2235);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.6);}
.header-left{display:flex;align-items:center;gap:12px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text h1{font-size:16px;font-weight:800;color:var(--text);}
.logo-text span{font-size:11px;color:var(--text3);}
.header-right{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;
  font-family:'Heebo';font-size:12px;font-weight:700;transition:all 0.15s;
  display:flex;align-items:center;gap:5px;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.btn-success{background:#1a8a4a;color:#fff;}
.btn-warning{background:#7a5200;color:#ffd166;}
.btn-danger{background:#7a1a1a;color:#ff8080;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.week-bar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.week-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:7px;padding:6px 10px;font-family:'Heebo';font-size:12px;min-width:220px;cursor:pointer;}
.week-badge{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.tabs{display:flex;gap:2px;padding:12px 20px 0;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{padding:8px 16px;border-radius:7px 7px 0 0;font-size:12px;font-weight:700;cursor:pointer;
  border:1px solid transparent;border-bottom:none;transition:all .15s;}
.tab-on{background:var(--bg);border-color:var(--border);color:var(--text);}
.tab-off{color:var(--text3);}
.tab-off:hover{color:var(--text2);}
.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;
  padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.ldot{width:11px;height:11px;border-radius:3px;}
.warn-bar{padding:8px 20px;display:flex;gap:10px;flex-wrap:wrap;
  background:var(--surface);border-bottom:1px solid var(--border);}
.warn{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 9px;
  border-radius:5px;font-weight:600;}
.warn-bad{background:rgba(192,57,43,.12);color:#e74c3c;border:1px solid rgba(192,57,43,.25);}
.warn-ok{background:rgba(39,174,96,.12);color:#2ecc71;border:1px solid rgba(39,174,96,.25);}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);margin:16px 20px;}
.sched-table{width:100%;border-collapse:collapse;min-width:1100px;}
.sched-table th{background:var(--surface2);padding:8px 5px;font-size:11px;font-weight:700;
  color:var(--text2);text-align:center;border:1px solid var(--border);white-space:nowrap;}
.sched-table th.day-hdr{background:linear-gradient(135deg,var(--surface2),var(--surface3));
  color:var(--text);font-size:12px;padding:10px 6px;}
.sched-table th.sub-hdr{font-size:10px;color:var(--text3);font-weight:500;padding:5px 3px;}
.sched-table td{border:1px solid var(--border);padding:2px;vertical-align:middle;text-align:center;}
.name-cell{background:var(--surface2) !important;padding:6px 10px !important;
  text-align:right !important;white-space:nowrap;position:sticky;right:0;z-index:5;min-width:110px !important;}
.emp-name{font-size:12px;font-weight:700;color:var(--text);}
.emp-ext{font-size:10px;color:var(--text3);}
.emp-backup{font-size:10px;color:var(--accent);}
.emp-role-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-top:1px;}
.role-mgr{background:rgba(124,106,247,.2);color:#a090ff;}
.role-adv{background:rgba(79,142,247,.15);color:#6aabff;}
.role-int{background:rgba(39,174,96,.15);color:#5ddb8a;}
.sc{display:flex;align-items:center;justify-content:center;border-radius:5px;
  height:34px;cursor:pointer;transition:all .12s;font-size:10px;font-weight:700;
  border:1px solid transparent;margin:1px;user-select:none;}
.sc:hover{filter:brightness(1.25);transform:scale(1.03);}
.sc-morning{background:#1a1e32;border-color:#2e3460;color:#6070b0;}
.sc-wfh{background:#0c2240;border-color:#1a5fa0;color:#3d9de8;}
.sc-evening{background:#181c2e;border-color:#2a2e50;color:#7080b8;}
.sc-vacation{background:#1e1800;border-color:#8a6800;color:#c89000;}
.sc-sick{background:#1e0808;border-color:#8a2020;color:#d04040;}
.sc-reserve{background:#1a1400;border-color:#6a5000;color:#b08030;}
.sc-off{background:#0a0c14;border-color:#161828;color:#2a3050;}
.sc-wfheve{background:#0a1a30;border-color:#1050a0;color:#2880d0;}
.dd-wrap{position:relative;}
.dd-menu{position:absolute;top:calc(100% + 2px);right:50%;transform:translateX(50%);
  background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:5px;z-index:300;min-width:135px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:1px;}
.dd-opt{padding:6px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;
  transition:background .1s;display:flex;align-items:center;gap:6px;color:var(--text);}
.dd-opt:hover{background:var(--surface3);}
.dd-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.dd-check{margin-right:auto;color:var(--accent);font-size:10px;}
.stat-row{display:flex;gap:4px;flex-wrap:wrap;padding:2px;}
.sb{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;}
.sb-ok{background:rgba(39,174,96,.15);color:#2ecc71;}
.sb-bad{background:rgba(192,57,43,.15);color:#e74c3c;}
.sb-info{background:rgba(79,142,247,.15);color:var(--accent);}
.sb-neu{background:rgba(124,106,247,.12);color:#9080e8;}
.role-divider td{background:linear-gradient(90deg,var(--surface3),var(--surface2));
  padding:5px 12px;font-size:10px;font-weight:800;color:var(--text2);
  text-transform:uppercase;letter-spacing:1px;border:1px solid var(--border);}
.duties-wrap{margin:0 20px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.duties-hdr{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.duties-hdr h3{font-size:13px;font-weight:800;color:var(--text);}
.duties-grid{display:grid;grid-template-columns:repeat(6,1fr);}
.duty-col{border-left:1px solid var(--border);}
.duty-col:last-child{border-left:none;}
.duty-day-hdr{padding:7px;background:var(--surface2);text-align:center;
  font-size:11px;font-weight:800;color:var(--text2);border-bottom:1px solid var(--border);}
.duty-item{padding:6px;border-bottom:1px solid var(--border);}
.duty-item:last-child{border-bottom:none;}
.duty-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;}
.duty-sel{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:4px;padding:3px 5px;font-family:'Heebo';font-size:10px;cursor:pointer;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:22px;min-width:320px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal h3{font-size:15px;font-weight:800;margin-bottom:14px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;}
.fc{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:7px;padding:7px 10px;font-family:'Heebo';font-size:12px;}
.fc:focus{outline:none;border-color:var(--accent);}
.admin-wrap{padding:16px 20px;}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.acard-hdr{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);
  font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:space-between;}
.acard-body{padding:14px;}
.eli{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;
  border-radius:7px;margin-bottom:3px;background:var(--surface2);font-size:12px;}
.eli:hover{background:var(--surface3);}
.sum-wrap{padding:16px 20px;}
.sum-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.sum-card .val{font-size:26px;font-weight:900;color:var(--accent);}
.sum-card .lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.sum-emp{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
.sum-emp-name{font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.sum-stats{display:flex;gap:4px;flex-wrap:wrap;}
.empty{text-align:center;padding:50px;color:var(--text3);}
.eicon{font-size:44px;margin-bottom:10px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media print{
  .header-right,.week-bar .btn,.tabs,.warn-bar{display:none !important;}
  .tbl-wrap{margin:0;border:none;}
  body{background:#fff;color:#000;}
}
</style>
</head>

function buildDefault(emps) {
  const s = {};
  emps.forEach(emp => {
    s[emp.id] = {};
    for (let d=0;d<6;d++) {
      const r = emp.sched[d] || {m:'off',e:'off'};
      s[emp.id][d] = { morning: r.m||'off', evening: r.e||'off' };
    }
  });
  return s;
}

const LS = {
  get:(k,d)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }
};

function thisWeekSunday() {
  const d=new Date(); const sun=new Date(d); sun.setDate(d.getDate()-d.getDay());
  return `${sun.getFullYear()}-${String(sun.getMonth()+1).padStart(2,'0')}-${String(sun.getDate()).padStart(2,'0')}`;
}
function weekLabel(key) {
  const [y,m,d]=key.split('-').map(Number);
  const sun=new Date(y,m-1,d); const fri=new Date(sun); fri.setDate(sun.getDate()+5);
  const f=dt=>`${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`;
  return `${f(sun)} – ${f(fri)}`;
}

function ShiftCell({type,onClick}) {
  return <div className={`sc ${SHIFT_CSS[type]||'sc-off'}`} onClick={onClick}>{SHIFT_LABELS[type]||'—'}</div>;
}
function CellDD({value,onChange}) {
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[open]);
  return (
    <div className="dd-wrap" ref={ref}>
      <ShiftCell type={value} onClick={()=>setOpen(o=>!o)}/>
      {open&&(
        <div className="dd-menu" onClick={e=>e.stopPropagation()}>
          {SHIFT_TYPES.map(t=>(
            <div key={t} className="dd-opt" style={value===t?{background:'var(--surface3)'}:{}}
              onClick={()=>{onChange(t);setOpen(false);}}>
              <span className="dd-dot" style={{background:SHIFT_COLORS[t]}}></span>
              {SHIFT_LABELS[t]}
              {value===t&&<span className="dd-check">✓</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
function EmpStats({empId,schedule}) {
  const s=schedule[empId]||{};
  let m=0,e=0,wfh=0,v=0,sick=0,res=0;
  for(let d=0;d<6;d++){
    const c=s[d]||{};
    if(c.morning==='morning')m++;
    if(c.morning==='wfh'){m++;wfh++;}
    if(c.morning==='wfheve')wfh++;
    if(c.evening==='evening')e++;
    if(c.evening==='wfheve'){e++;wfh++;}
    if(c.morning==='vacation'||c.evening==='vacation')v++;
    if(c.morning==='sick'||c.evening==='sick')sick++;
    if(c.morning==='reserve'||c.evening==='reserve')res++;
  }
  const total=m+e;
  const ok=total>=5&&wfh<=1;
  return (
    <div className="stat-row">
      <span className={`sb ${ok?'sb-ok':'sb-bad'}`}>{total}</span>
      <span className="sb sb-info">🏠{wfh}</span>
      {v>0&&<span className="sb" style={{background:'rgba(138,104,0,.2)',color:'#c89000'}}>🌴{v}</span>}
      {sick>0&&<span className="sb" style={{background:'rgba(138,32,32,.2)',color:'#d04040'}}>🤒{sick}</span>}
      {res>0&&<span className="sb" style={{background:'rgba(106,80,0,.2)',color:'#b08030'}}>🪖{res}</span>}
    </div>
  );
}

  const [duties,setDuties]=useState(()=>LS.get('duties_v3',{}));
  const [curWeek,setCurWeek]=useState(()=>thisWeekSunday());
  const [tab,setTab]=useState('schedule');
  const [isAdmin,setIsAdmin]=useState(true);
  const [weekModal,setWeekModal]=useState(false);
  const [newWKey,setNewWKey]=useState('');

  useEffect(()=>LS.set('emp_v3',employees),[employees]);

  const schedule=weeks[curWeek]||{};
  const today=thisWeekSunday();

  const weekDuties=duties[curWeek]||(() => {
    const d={};
    DAYS.forEach((_,di)=>{d[di]={};DUTY_TYPES.forEach((_,dti)=>{d[di][dti]=DEFAULT_DUTIES[di]?.[dti]||'';});});
    return d;
  })();

  const setSchedule=upd=>setWeeks(prev=>{
    const next={...prev,[curWeek]:typeof upd==='function'?upd(prev[curWeek]||{}):upd};
    LS.set('weeks_v3',next);return next;
  });
  const setWeekDuties=upd=>setDuties(prev=>{
    const next={...prev,[curWeek]:typeof upd==='function'?upd(prev[curWeek]||{}):upd};
    LS.set('duties_v3',next);return next;
  });
  const initWeek=(key,fromKey)=>{
    setWeeks(prev=>{
      const base=fromKey&&prev[fromKey]?JSON.parse(JSON.stringify(prev[fromKey])):buildDefault(employees);
      const next={...prev,[key]:base};LS.set('weeks_v3',next);return next;
    });
    setCurWeek(key);
  };
  const autoGen=()=>{
    if(!window.confirm('לאפס לסידור ברירת מחדל מהתמונה?'))return;
    setSchedule(buildDefault(employees));
  };
  const exportExcel=()=>{
    const wb=XLSX.utils.book_new();
    const rows=[['עובד','שלוחה','תפקיד',...DAYS.flatMap(d=>[d+' בוקר',d+' ערב']),'סה"כ']];
    employees.forEach(emp=>{
      const row=[emp.name,emp.ext,ROLE_LABELS[emp.role]];let total=0;
      DAYS.forEach((_,di)=>{
        const c=schedule[emp.id]?.[di]||{};
        row.push(SHIFT_LABELS[c.morning||'off'],SHIFT_LABELS[c.evening||'off']);
        if(c.morning&&!['off','vacation','sick','reserve'].includes(c.morning))total++;
        if(c.evening&&!['off','vacation','sick','reserve'].includes(c.evening))total++;
      });
      row.push(total);rows.push(row);
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),'סידור');
    XLSX.writeFile(wb,`סידור_${curWeek}.xlsx`);
  };
  const weekList=[...new Set([curWeek,...Object.keys(weeks)])].sort().reverse();

  return (
    <div>

            {isAdmin?'🔐 מנהל':'👤 משתמש'}
          </span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setIsAdmin(!isAdmin)}>{isAdmin?'מצב משתמש':'מצב מנהל'}</button>

          <button className="btn btn-success btn-sm" onClick={exportExcel}>📥 Excel</button>

        <select className="week-select" value={curWeek} onChange={e=>setCurWeek(e.target.value)}>
          {weekList.map(wk=><option key={wk} value={wk}>{weekLabel(wk)}{wk===today?' (השבוע)':''}</option>)}
        </select>
        <span className="week-badge">{weekLabel(curWeek)}</span>
        <button className="btn btn-primary btn-sm" onClick={()=>setWeekModal(true)}>+ שבוע חדש</button>

      </div>
      <div className="legend">
        {[['#2e3460','☀️ בוקר'],['#1a5fa0','🏠 WFH'],['#2a2e50','🌙 ערב'],
          ['#8a6800','🌴 חופש'],['#8a2020','🤒 מחלה'],['#6a5000','🪖 מילואים'],['#161828','➖ חופשי']
        ].map(([bg,lbl])=>(
          <div key={lbl} className="legend-item"><span className="ldot" style={{background:bg}}></span>{lbl}</div>
        ))}
      </div>
      <div className="tabs">
        {[['schedule','📅 סידור'],['summary','📊 סיכום'],...(isAdmin?[['admin','⚙️ ניהול']]:[])].map(([k,l])=>(
          <div key={k} className={`tab ${tab===k?'tab-on':'tab-off'}`} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>
      {!weeks[curWeek]&&tab==='schedule'?(
        <div style={{padding:'20px'}}>
          <div className="empty">
            <div className="eicon">📅</div>
            <div style={{marginBottom:14}}>אין סידור לשבוע זה</div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="btn btn-primary" onClick={()=>initWeek(curWeek,null)}>⚡ ייצר סידור ברירת מחדל</button>
              {weekList.length>1&&<button className="btn btn-ghost" onClick={()=>initWeek(curWeek,weekList.find(w=>w!==curWeek))}>🔁 שכפל מהשבוע הקודם</button>}
            </div>
          </div>
        </div>
      ):(
        <>
          {tab==='schedule'&&<ScheduleTab employees={employees} schedule={schedule} setSchedule={setSchedule} duties={weekDuties} setDuties={setWeekDuties}/>}
          {tab==='summary'&&<SummaryTab employees={employees} schedule={schedule}/>}
          {tab==='admin'&&isAdmin&&<AdminTab employees={employees} setEmployees={setEmployees}/>}
        </>
      )}
      {weekModal&&(
        <div className="modal-overlay">
          <div className="modal">
            <h3>📅 שבוע חדש</h3>
            <div className="fg"><label>תאריך ראשון בשבוע (ראשון)</label>
              <input className="fc" type="date" value={newWKey} onChange={e=>setNewWKey(e.target.value)}/>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setWeekModal(false)}>ביטול</button>
              <button className="btn btn-primary" disabled={!newWKey}
                onClick={()=>{initWeek(newWKey,curWeek);setWeekModal(false);}}>צור</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
