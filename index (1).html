<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מרכז יועצי השקעות - סידור עבודה</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f18;--surface:#141720;--surface2:#1c2030;--surface3:#242840;
  --border:#2a2f4a;--accent:#4f8ef7;--accent2:#7c6af7;
  --text:#e8eaf6;--text2:#8a93c8;--text3:#4a5280;
  --radius:10px;--shadow:0 4px 24px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#161925,#1e2235);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;
  position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,0.6);}
.header-left{display:flex;align-items:center;gap:12px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text h1{font-size:15px;font-weight:800;}
.logo-text span{font-size:10px;color:var(--text3);}
.header-right{display:flex;gap:7px;align-items:center;}

/* ── BUTTONS ── */
.btn{padding:6px 13px;border-radius:7px;border:none;cursor:pointer;
  font-family:'Heebo';font-size:12px;font-weight:700;transition:all .15s;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);}
.btn-success{background:#1a8a4a;color:#fff;}
.btn-success:hover{background:#1e9f55;}
.btn-warning{background:#7a5200;color:#ffd166;}
.btn-danger{background:#7a1a1a;color:#ff8080;}
.btn-teal{background:#0d5a5a;color:#5ddbdb;}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── WEEK BAR ── */
.week-bar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:58px;z-index:190;}
.week-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:7px;padding:5px 9px;font-family:'Heebo';font-size:12px;min-width:200px;cursor:pointer;}
.week-badge{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}

/* ── TABS ── */
.tabs{display:flex;gap:2px;padding:10px 20px 0;background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:103px;z-index:180;}
.tab{padding:7px 14px;border-radius:7px 7px 0 0;font-size:12px;font-weight:700;cursor:pointer;
  border:1px solid transparent;border-bottom:none;transition:all .15s;}
.tab-on{background:var(--bg);border-color:var(--border);color:var(--text);}
.tab-off{color:var(--text3);}
.tab-off:hover{color:var(--text2);}

/* ── LEGEND ── */
.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  padding:7px 20px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:139px;z-index:170;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.ldot{width:10px;height:10px;border-radius:3px;}

/* ── WARNINGS ── */
.warn-bar{padding:7px 20px;display:flex;gap:8px;flex-wrap:wrap;
  background:var(--surface);border-bottom:1px solid var(--border);}
.warn{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;
  border-radius:5px;font-weight:600;}
.warn-bad{background:rgba(192,57,43,.12);color:#e74c3c;border:1px solid rgba(192,57,43,.25);}
.warn-ok{background:rgba(39,174,96,.12);color:#2ecc71;border:1px solid rgba(39,174,96,.25);}

/* ── TABLE ── */
.tbl-outer{overflow-x:auto;margin:14px 20px;border-radius:var(--radius);border:1px solid var(--border);}
.sched-table{width:100%;border-collapse:collapse;min-width:1100px;}

/* Sticky column header rows */
.sched-table thead th{
  position:sticky;z-index:60;
  background:var(--surface2);
  border:1px solid var(--border);
  padding:8px 5px;font-size:11px;font-weight:700;color:var(--text2);text-align:center;white-space:nowrap;
}
.sched-table thead tr:first-child th{ top:0; }
.sched-table thead tr:nth-child(2) th{ top:37px; }

.sched-table th.day-hdr{
  background:linear-gradient(135deg,#1e2438,#242840);color:var(--text);font-size:12px;padding:9px 6px;}
.sched-table th.sub-hdr{font-size:10px;color:var(--text3);font-weight:500;padding:5px 3px;}

/* Sticky name column */
.sched-table td{border:1px solid var(--border);padding:2px;vertical-align:middle;text-align:center;}
.name-cell{
  background:var(--surface2) !important;padding:6px 10px !important;
  text-align:right !important;white-space:nowrap;
  position:sticky;right:0;z-index:50;min-width:112px !important;
}
/* First header cell: sticky top AND right */
.sched-table thead tr:first-child th:first-child{
  right:0;z-index:70;
  background:var(--surface3);
}
.sched-table thead tr:nth-child(2) th:first-child{ display:none; }

.emp-name{font-size:12px;font-weight:700;color:var(--text);}
.emp-ext{font-size:10px;color:var(--text3);}
.emp-backup{font-size:10px;color:var(--accent);}
.emp-role-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-top:2px;}
.role-mgr{background:rgba(124,106,247,.2);color:#a090ff;}
.role-adv{background:rgba(79,142,247,.15);color:#6aabff;}
.role-int{background:rgba(39,174,96,.15);color:#5ddb8a;}

/* ── SHIFT CELLS ── */
.sc{display:flex;align-items:center;justify-content:center;border-radius:5px;
  height:33px;cursor:pointer;transition:all .12s;font-size:10px;font-weight:700;
  border:1px solid transparent;margin:1px;user-select:none;}
.sc:hover{filter:brightness(1.3);transform:scale(1.04);}
.sc-morning{background:#1a1e32;border-color:#2e3460;color:#6070b0;}
.sc-wfh{background:#0c2240;border-color:#1a5fa0;color:#3d9de8;}
.sc-evening{background:#181c2e;border-color:#2a2e50;color:#7080b8;}
.sc-vacation{background:#1e1800;border-color:#8a6800;color:#c89000;}
.sc-sick{background:#1e0808;border-color:#8a2020;color:#d04040;}
.sc-reserve{background:#1a1400;border-color:#6a5000;color:#b08030;}
.sc-off{background:#0a0c14;border-color:#161828;color:#2a3050;}
.sc-wfheve{background:#0a1a30;border-color:#1050a0;color:#2880d0;}

/* ── DROPDOWN ── */
.dd-wrap{position:relative;}
.dd-menu{position:absolute;top:calc(100% + 2px);right:50%;transform:translateX(50%);
  background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:5px;z-index:400;min-width:135px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:1px;}
.dd-opt{padding:6px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;
  transition:background .1s;display:flex;align-items:center;gap:6px;color:var(--text);}
.dd-opt:hover{background:var(--surface3);}
.dd-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.dd-check{margin-right:auto;color:var(--accent);font-size:10px;}

/* ── STATS ── */
.stat-row{display:flex;gap:3px;flex-wrap:wrap;padding:2px;}
.sb{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;}
.sb-ok{background:rgba(39,174,96,.15);color:#2ecc71;}
.sb-bad{background:rgba(192,57,43,.15);color:#e74c3c;}
.sb-info{background:rgba(79,142,247,.15);color:var(--accent);}
.sb-neu{background:rgba(124,106,247,.12);color:#9080e8;}

/* ── GROUP DIVIDER ── */
.role-divider td{background:linear-gradient(90deg,var(--surface3),var(--surface2));
  padding:5px 12px;font-size:10px;font-weight:800;color:var(--text2);
  letter-spacing:1px;border:1px solid var(--border);}

/* ── DUTIES ── */
.duties-wrap{margin:0 20px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.duties-hdr{padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.duties-hdr h3{font-size:13px;font-weight:800;}
.duties-grid{display:grid;grid-template-columns:repeat(6,1fr);}
.duty-col{border-left:1px solid var(--border);}
.duty-col:last-child{border-left:none;}
.duty-day-hdr{padding:6px;background:var(--surface2);text-align:center;
  font-size:11px;font-weight:800;color:var(--text2);border-bottom:1px solid var(--border);}
.duty-item{padding:5px;border-bottom:1px solid var(--border);}
.duty-item:last-child{border-bottom:none;}
.duty-lbl{font-size:10px;color:var(--text3);margin-bottom:2px;}
.duty-sel{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:4px;padding:3px 4px;font-family:'Heebo';font-size:10px;cursor:pointer;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);
  display:flex;align-items:center;justify-content:center;z-index:600;backdrop-filter:blur(5px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:13px;
  padding:22px;min-width:320px;max-width:94vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal h3{font-size:15px;font-weight:800;margin-bottom:14px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;}
.fc{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:7px;padding:7px 10px;font-family:'Heebo';font-size:12px;}
.fc:focus{outline:none;border-color:var(--accent);}

/* ── ADMIN ── */
.admin-wrap{padding:16px 20px;}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.acard-hdr{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);
  font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:space-between;}
.acard-body{padding:14px;}
.eli{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;
  border-radius:7px;margin-bottom:3px;background:var(--surface2);font-size:12px;}
.eli:hover{background:var(--surface3);}

/* ── SUMMARY ── */
.sum-wrap{padding:16px 20px;}
.sum-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:9px;margin-bottom:14px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;}
.sum-card .val{font-size:24px;font-weight:900;color:var(--accent);}
.sum-card .lbl{font-size:10px;color:var(--text3);margin-top:1px;}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;}
.sum-emp{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;}
.sum-emp-name{font-size:12px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
.sum-stats{display:flex;gap:3px;flex-wrap:wrap;}

/* ── CONSTRAINTS TAB ── */
.con-wrap{padding:16px 20px;}
.con-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.con-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.con-hdr{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);
  font-size:13px;font-weight:800;color:var(--text);}
.con-body{padding:14px;}
.con-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.con-row:last-child{border-bottom:none;}
.con-label{flex:1;color:var(--text2);}
.con-input{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:5px;padding:4px 8px;font-family:'Heebo';font-size:12px;width:60px;text-align:center;}
.con-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:5px;padding:4px 7px;font-family:'Heebo';font-size:11px;cursor:pointer;}
.emp-con-table{width:100%;border-collapse:collapse;font-size:11px;}
.emp-con-table th{background:var(--surface3);padding:5px 8px;text-align:right;border:1px solid var(--border);
  color:var(--text2);font-weight:700;}
.emp-con-table td{border:1px solid var(--border);padding:4px 6px;text-align:center;vertical-align:middle;}
.emp-con-table td:first-child{text-align:right;font-weight:600;color:var(--text);}
.day-cb{width:14px;height:14px;cursor:pointer;accent-color:var(--accent);}
.gen-result{margin-top:12px;padding:10px 14px;background:rgba(39,174,96,.08);
  border:1px solid rgba(39,174,96,.2);border-radius:8px;font-size:12px;color:#2ecc71;font-weight:600;}
.gen-warning{background:rgba(231,76,60,.08);border-color:rgba(231,76,60,.2);color:#e74c3c;}

/* ── FOOTER ── */
.footer{text-align:center;padding:14px;font-size:10px;color:var(--text3);
  border-top:1px solid var(--border);margin-top:20px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px;color:var(--text3);}
.eicon{font-size:42px;margin-bottom:10px;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── PRINT ── */
@media print{
  .header-right,.week-bar .btn,.tabs,.warn-bar,.footer{display:none !important;}
  .tbl-outer{margin:0;border:none;}
  body{background:#fff;color:#000;}
  .sched-table th{background:#eee !important;color:#000 !important;}
  .name-cell{background:#f5f5f5 !important;}
  .sc{border:1px solid #ccc !important;color:#000 !important;background:#fff !important;}
  .sc-wfh{background:#d0e8ff !important;}
  .sc-evening{background:#e0e0e0 !important;}
  .sc-vacation{background:#fffacc !important;}
  .sc-sick{background:#ffe0e0 !important;}
  .sc-reserve{background:#fff0cc !important;}
}
</style>
</head>

      const r=emp.sched[d]||{m:'off',e:'off'};

function thisWeekSunday(){
  const d=new Date();const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());
  return`${sun.getFullYear()}-${String(sun.getMonth()+1).padStart(2,'0')}-${String(sun.getDate()).padStart(2,'0')}`;
}
function weekLabel(key){
  const[y,m,d]=key.split('-').map(Number);
  const sun=new Date(y,m-1,d);const fri=new Date(sun);fri.setDate(sun.getDate()+5);
  const f=dt=>`${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`;
  return`${f(sun)} – ${f(fri)}`;
}

/* ════════════════════════════════════
   SCHEDULE GENERATOR (constraint-based)
════════════════════════════════════ */
function generateSchedule(employees, constraints, empConstraints){
  const{targetMorning,targetEvening,targetWFH,targetOfficeEvening}=constraints;
  const sched={};

  employees.forEach(emp=>{
    sched[emp.id]={};
    const ec=empConstraints[emp.id]||{};
    // forced days off / vacation / sick / reserve
    const forcedOff=new Set(ec.daysOff||[]);
    const forcedVacation=new Set(ec.vacation||[]);
    const forcedSick=new Set(ec.sick||[]);
    const forcedReserve=new Set(ec.reserve||[]);
    const mustEvening=new Set(ec.mustEvening||[]);
    const mustWFH=new Set(ec.mustWFH||[]);

    // Initialize all days
    for(let d=0;d<6;d++){
      sched[emp.id][d]={morning:'off',evening:'off'};
    }

    // Apply forced statuses first
    for(let d=0;d<6;d++){
      if(forcedVacation.has(d)){sched[emp.id][d]={morning:'vacation',evening:'off'};continue;}
      if(forcedSick.has(d)){sched[emp.id][d]={morning:'sick',evening:'off'};continue;}
      if(forcedReserve.has(d)){sched[emp.id][d]={morning:'reserve',evening:'off'};continue;}
      if(forcedOff.has(d)) continue; // stays off
    }

    if(emp.role==='mgr') return; // managers: skip auto-assignment

    // Available days (not forced to anything)
    const available=[];
    for(let d=0;d<6;d++){
      if(!forcedVacation.has(d)&&!forcedSick.has(d)&&!forcedReserve.has(d)&&!forcedOff.has(d)){
        available.push(d);
      }
    }

    // Assign evening shifts first (from mustEvening, then fill to targetEvening)
    let eveningDays=[...mustEvening].filter(d=>available.includes(d));
    const availableForEvening=available.filter(d=>!mustWFH.has(d)&&!eveningDays.includes(d));
    // shuffle for variety
    availableForEvening.sort(()=>Math.random()-.5);
    while(eveningDays.length<Math.min(targetEvening,available.length-1)){
      if(!availableForEvening.length)break;
      eveningDays.push(availableForEvening.shift());
    }
    eveningDays=eveningDays.slice(0,targetEvening);

    // Assign morning / WFH to remaining days
    const morningDays=available.filter(d=>!eveningDays.includes(d));

    // Exactly 1 WFH
    let wfhDay=-1;
    if(mustWFH.size>0){
      const mw=[...mustWFH].find(d=>morningDays.includes(d));
      if(mw!==undefined) wfhDay=mw;
    }
    if(wfhDay===-1&&morningDays.length>0){
      // pick a WFH day that's not Friday (index 5) preferably
      const preferred=morningDays.filter(d=>d!==5);
      wfhDay=(preferred.length?preferred:morningDays)[Math.floor(Math.random()*((preferred.length||morningDays.length)))];
    }

    // Apply to schedule
    eveningDays.forEach(d=>{ sched[emp.id][d]={morning:'off',evening:'evening'}; });
    morningDays.forEach(d=>{
      sched[emp.id][d]={morning:d===wfhDay?'wfh':'morning',evening:'off'};
    });
  });

  return sched;
}

  // Header row 2
  const h2=['','',''];
  DAYS.forEach(()=>{h2.push('בוקר','ערב');});

  // Role sections
  const groups=[

    if(!list.length)return;
    // Section header
    const secRow=[label];
    for(let i=0;i<14;i++)secRow.push('');
    wsData.push(secRow);

    list.forEach(emp=>{
      const row=[emp.name,emp.ext,ROLE_LABELS[emp.role]];
      let total=0;
      DAYS.forEach((_,di)=>{
        const c=schedule[emp.id]?.[di]||{};
        const ml=SHIFT_LABELS[c.morning||'off'];
        const el=SHIFT_LABELS[c.evening||'off'];
        row.push(ml,el);
        if(c.morning&&!['off','vacation','sick','reserve'].includes(c.morning))total++;
        if(c.evening&&!['off','vacation','sick','reserve'].includes(c.evening))total++;
      });
      row.push(total,'');
      wsData.push(row);
    });
  });

  // Empty row + summary
  wsData.push([]);
  wsData.push(['סיכום יומי','','']);
  const sumHeaderRow=['',''];
  DAYS.forEach(d=>{sumHeaderRow.push(d,'');});
  wsData.push(sumHeaderRow);

  const morningRow=['בוקר (כולל WFH)',''];
  const eveningRow=['ערב',''];
  const wfhRow=['WFH',''];
  const officeRow=['משרד בוקר',''];

  DAYS.forEach((_,di)=>{
    let m=0,e=0,wfh=0,office=0;
    employees.forEach(emp=>{
      const c=schedule[emp.id]?.[di]||{};
      if(c.morning==='morning'){m++;office++;}
      if(c.morning==='wfh'){m++;wfh++;}
      if(c.evening==='evening')e++;
    });
    morningRow.push(m,'');
    eveningRow.push(e,'');
    wfhRow.push(wfh,'');
    officeRow.push(office,'');
  });
  wsData.push(morningRow,eveningRow,wfhRow,officeRow);

  const ws=XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols']=[
    {wch:16},{wch:8},{wch:10},
    {wch:12},{wch:10},{wch:12},{wch:10},{wch:12},{wch:10},
    {wch:12},{wch:10},{wch:12},{wch:10},{wch:12},{wch:10},
    {wch:12},{wch:10},
  ];

  // Merge title
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:14}}];

  XLSX.utils.book_append_sheet(wb,ws,'סידור שבועי');

  // ── Sheet 2: Individual stats ──
  const statsData=[['סיכום עובדים - '+weekLabel(weekKey)]];
  statsData.push(['שם','תפקיד','מגבה','בוקר','WFH','ערב','חופשות','מחלות','מילואים','סה"כ','תקין?']);
  employees.forEach(emp=>{
    let m=0,e=0,wfh=0,v=0,s=0,r=0;
    for(let d=0;d<6;d++){
      const c=schedule[emp.id]?.[d]||{};
      if(c.morning==='morning')m++;
      if(c.morning==='wfh'){m++;wfh++;}
      if(c.evening==='evening')e++;
      if(c.morning==='vacation'||c.evening==='vacation')v++;
      if(c.morning==='sick'||c.evening==='sick')s++;
      if(c.morning==='reserve'||c.evening==='reserve')r++;
    }
    const total=m+e;
    const ok=emp.role==='mgr'||(total>=5&&wfh<=1)?'✓':'✗';
    statsData.push([emp.name,ROLE_LABELS[emp.role],emp.backup||'',m,wfh,e,v,s,r,total,ok]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(statsData);
  ws2['!cols']=[{wch:14},{wch:8},{wch:14},{wch:6},{wch:6},{wch:6},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws2,'סיכום עובדים');

  XLSX.writeFile(wb,`סידור_${weekKey}.xlsx`);
}

function ShiftCell({type,onClick}){
  return <div className={`sc ${SHIFT_CSS[type]||'sc-off'}`} onClick={onClick}>{SHIFT_LABELS[type]||'—'}</div>;
}

function CellDD({value,onChange}){
  const[open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[open]);
  return(
    <div className="dd-wrap" ref={ref}>
      <ShiftCell type={value} onClick={()=>setOpen(o=>!o)}/>
      {open&&(
        <div className="dd-menu" onClick={e=>e.stopPropagation()}>
          {SHIFT_TYPES.map(t=>(
            <div key={t} className="dd-opt" style={value===t?{background:'var(--surface3)'}:{}}
              onClick={()=>{onChange(t);setOpen(false);}}>
              <span className="dd-dot" style={{background:SHIFT_COLORS[t]}}></span>
              {SHIFT_LABELS[t]}
              {value===t&&<span className="dd-check">✓</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function EmpStats({empId,schedule}){
  const s=schedule[empId]||{};
  let m=0,e=0,wfh=0,v=0,sick=0,res=0;
  for(let d=0;d<6;d++){
    const c=s[d]||{};
    if(c.morning==='morning')m++;
    if(c.morning==='wfh'){m++;wfh++;}
    if(c.morning==='wfheve')wfh++;
    if(c.evening==='evening')e++;
    if(c.morning==='vacation'||c.evening==='vacation')v++;
    if(c.morning==='sick'||c.evening==='sick')sick++;
    if(c.morning==='reserve'||c.evening==='reserve')res++;
  }
  const total=m+e;const ok=total>=5&&wfh<=1;
  return(
    <div className="stat-row">
      <span className={`sb ${ok?'sb-ok':'sb-bad'}`}>{total}</span>
      <span className="sb sb-info">🏠{wfh}</span>
      {v>0&&<span className="sb" style={{background:'rgba(138,104,0,.2)',color:'#c89000'}}>🌴{v}</span>}
      {sick>0&&<span className="sb" style={{background:'rgba(138,32,32,.2)',color:'#d04040'}}>🤒{sick}</span>}
      {res>0&&<span className="sb" style={{background:'rgba(106,80,0,.2)',color:'#b08030'}}>🪖{res}</span>}
    </div>
  );
}

    setEmpCon(prev=>{
      const ec=prev[empId]||{};
      const arr=new Set(ec[type]||[]);
      if(arr.has(dayIdx))arr.delete(dayIdx);else arr.add(dayIdx);
      return{...prev,[empId]:{...ec,[type]:[...arr]}};

    setTimeout(()=>setResult(null),4000);
  };

  const advEmployees=employees.filter(e=>e.role==='adv');

  return(
    <div className="con-wrap">
      <div className="con-grid">
        {/* Global constraints */}
        <div className="con-card">
          <div className="con-hdr">⚙️ כללי המשמרות הרצויים</div>
          <div className="con-body">
            {[
              {label:'משמרות בוקר לעובד בשבוע',key:'targetMorning',min:1,max:5},
              {label:'משמרות ערב לעובד בשבוע',key:'targetEvening',min:0,max:4},
              {label:'ימי WFH לעובד בשבוע',key:'targetWFH',min:0,max:3},
              {label:'מינימום עובדים במשמרת בוקר',key:'minPerShift',min:1,max:20},
              {label:'מקסימום עובדים במשמרת ערב',key:'maxEvening',min:1,max:20},
            ].map(({label,key,min,max})=>(
              <div key={key} className="con-row">
                <span className="con-label">{label}</span>
                <input type="number" className="con-input"
                  min={min} max={max} value={constraints[key]}
                  onChange={e=>setConstraints(p=>({...p,[key]:Number(e.target.value)}))}/>
              </div>
            ))}
          </div>
        </div>

        {/* Generate button */}
        <div className="con-card">
          <div className="con-hdr">🤖 יצירת סידור אוטומטי</div>
          <div className="con-body">
            <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.7,marginBottom:14}}>
              המערכת תייצר סידור שבועי מאוזן בהתבסס על:<br/>
              ✔ האילוצים הכלליים משמאל<br/>
              ✔ האילוצים האישיים לכל עובד מטה<br/>
              ✔ ניסיון לאזן את העומס בצורה שוויונית<br/>
              ✔ עדיפות לחלוקת ערבים אחידה<br/><br/>
              <strong style={{color:'var(--accent)'}}>הסידור שנוצר ניתן לעריכה מלאה לאחר מכן.</strong>
            </p>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'10px'}} onClick={handleGenerate}>
              ⚡ ייצר סידור אוטומטי עכשיו
            </button>
            {result&&(
              <div className={`gen-result ${result.ok?'':'gen-warning'}`} style={{marginTop:10}}>
                {result.ok?'✅':'⚠️'} {result.msg}
              </div>
            )}
            <div style={{marginTop:12,padding:'8px 10px',background:'rgba(79,142,247,.06)',
              border:'1px solid rgba(79,142,247,.15)',borderRadius:7,fontSize:11,color:'var(--text3)'}}>
              💡 הסידור נוצר על גבי הסידור הנוכחי של השבוע הנבחר. וודא שבחרת את השבוע הנכון.
            </div>
          </div>
        </div>
      </div>

      {/* Per-employee constraints */}
      <div className="con-card" style={{gridColumn:'1/-1'}}>
        <div className="con-hdr">👤 אילוצים אישיים לכל עובד</div>
        <div className="con-body" style={{overflowX:'auto'}}>
          <table className="emp-con-table">
            <thead>
              <tr>
                <th>עובד</th>
                <th colSpan={6}>🚫 ימי חופשה / לא זמין</th>
                <th colSpan={6}>🌙 ימי ערב מועדפים</th>
                <th colSpan={6}>🏠 יום WFH מועדף</th>
              </tr>
              <tr>
                <th></th>
                {DAYS.map(d=><th key={'o'+d} style={{fontSize:9,color:'var(--text3)'}}>{d}</th>)}
                {DAYS.map(d=><th key={'e'+d} style={{fontSize:9,color:'var(--text3)'}}>{d}</th>)}
                {DAYS.map(d=><th key={'w'+d} style={{fontSize:9,color:'var(--text3)'}}>{d}</th>)}
              </tr>
            </thead>
            <tbody>
              {advEmployees.map(emp=>{
                const ec=empCon[emp.id]||{};
                return(
                  <tr key={emp.id}>
                    <td>{emp.name}</td>
                    {DAYS.map((_,di)=>(
                      <td key={'o'+di}>
                        <input type="checkbox" className="day-cb"
                          checked={(ec.daysOff||[]).includes(di)}
                          onChange={()=>toggleDay(emp.id,'daysOff',di)}/>
                      </td>
                    ))}
                    {DAYS.map((_,di)=>(
                      <td key={'e'+di}>
                        <input type="checkbox" className="day-cb"
                          checked={(ec.mustEvening||[]).includes(di)}
                          onChange={()=>toggleDay(emp.id,'mustEvening',di)}/>
                      </td>
                    ))}
                    {DAYS.map((_,di)=>(
                      <td key={'w'+di}>
                        <input type="checkbox" className="day-cb"
                          checked={(ec.mustWFH||[]).includes(di)}
                          onChange={()=>toggleDay(emp.id,'mustWFH',di)}/>
                      </td>
                    ))}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ─── SUMMARY TAB ─── */
function SummaryTab({employees,schedule}){
  let totM=0,totE=0,totW=0,totV=0,totS=0,totR=0;
  employees.forEach(emp=>{
    for(let d=0;d<6;d++){
      const c=schedule[emp.id]?.[d]||{};
      if(c.morning==='morning')totM++;
      if(c.morning==='wfh'){totM++;totW++;}
      if(c.evening==='evening')totE++;
      if(c.morning==='vacation'||c.evening==='vacation')totV++;
      if(c.morning==='sick'||c.evening==='sick')totS++;
      if(c.morning==='reserve'||c.evening==='reserve')totR++;
    }
  });
  return(
    <div className="sum-wrap">
      <div className="sum-cards">
        <div className="sum-card"><div className="val">{employees.length}</div><div className="lbl">עובדים</div></div>
        <div className="sum-card"><div className="val">{totM}</div><div className="lbl">משמרות בוקר</div></div>
        <div className="sum-card"><div className="val">{totE}</div><div className="lbl">משמרות ערב</div></div>
        <div className="sum-card"><div className="val" style={{color:'#3d9de8'}}>{totW}</div><div className="lbl">WFH</div></div>
        <div className="sum-card"><div className="val" style={{color:'#c89000'}}>{totV}</div><div className="lbl">חופשות</div></div>
        <div className="sum-card"><div className="val" style={{color:'#d04040'}}>{totS}</div><div className="lbl">מחלות</div></div>
        <div className="sum-card"><div className="val" style={{color:'#b08030'}}>{totR}</div><div className="lbl">מילואים</div></div>
      </div>
      <div className="sum-grid">
        {employees.map(emp=>{
          let m=0,e=0,wfh=0,v=0,s=0,r=0;
          for(let d=0;d<6;d++){
            const c=schedule[emp.id]?.[d]||{};
            if(c.morning==='morning')m++;
            if(c.morning==='wfh'){m++;wfh++;}
            if(c.evening==='evening')e++;
            if(c.morning==='vacation'||c.evening==='vacation')v++;
            if(c.morning==='sick'||c.evening==='sick')s++;
            if(c.morning==='reserve'||c.evening==='reserve')r++;
          }
          const total=m+e;const ok=emp.role==='mgr'||total>=5;
          return(
            <div key={emp.id} className="sum-emp">
              <div className="sum-emp-name">
                <span>{emp.name}</span>
                <span className={`emp-role-badge ${ROLE_CSS[emp.role]}`}>{ROLE_LABELS[emp.role]}</span>
              </div>
              <div className="sum-stats">
                <span className={`sb ${ok?'sb-ok':'sb-bad'}`}>סה"כ {total}</span>
                <span className="sb sb-info">☀️{m}</span>
                <span className="sb sb-neu">🌙{e}</span>
                <span className="sb" style={{background:'rgba(26,95,160,.2)',color:'#3d9de8'}}>🏠{wfh}</span>
                {v>0&&<span className="sb" style={{background:'rgba(138,104,0,.2)',color:'#c89000'}}>🌴{v}</span>}
                {s>0&&<span className="sb" style={{background:'rgba(138,32,32,.2)',color:'#d04040'}}>🤒{s}</span>}
                {r>0&&<span className="sb" style={{background:'rgba(106,80,0,.2)',color:'#b08030'}}>🪖{r}</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── ADMIN TAB ─── */
function AdminTab({employees,setEmployees}){
  const[edit,setEdit]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[newE,setNewE]=useState({name:'',ext:'',role:'adv',backup:''});
  const saveEdit=()=>{setEmployees(p=>p.map(e=>e.id===edit.id?edit:e));setEdit(null);};
  const del=id=>{if(window.confirm('למחוק עובד זה?'))setEmployees(p=>p.filter(e=>e.id!==id));};
  const addEmp=()=>{
    const id=Math.max(...employees.map(e=>e.id))+1;
    setEmployees(p=>[...p,{...newE,id,sched:{}}]);
    setNewE({name:'',ext:'',role:'adv',backup:''});setShowAdd(false);
  };
  const move=(id,dir)=>{
    setEmployees(p=>{
      const a=[...p];const i=a.findIndex(e=>e.id===id);const j=i+dir;
      if(j<0||j>=a.length)return a;[a[i],a[j]]=[a[j],a[i]];return a;
    });
  };
  return(
    <div className="admin-wrap">
      <div className="acard">
        <div className="acard-hdr">
          👥 עובדים ({employees.length})
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ הוסף עובד</button>
        </div>
        <div className="acard-body" style={{maxHeight:480,overflowY:'auto'}}>
          {employees.map(emp=>{
            const bu=employees.find(e=>e.name===emp.backup);
            return(
              <div key={emp.id} className="eli">
                <div>
                  <span style={{fontWeight:700}}>{emp.name}</span>
                  <span style={{fontSize:10,color:'var(--text3)',marginRight:8}}>{emp.ext}</span>
                  <span className={`emp-role-badge ${ROLE_CSS[emp.role]}`}>{ROLE_LABELS[emp.role]}</span>
                  {bu&&<span style={{fontSize:10,color:'var(--accent)',marginRight:8}}>📌 {bu.name}</span>}
                </div>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>move(emp.id,-1)}>↑</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>move(emp.id,1)}>↓</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEdit({...emp})}>✏️</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>del(emp.id)}>🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {edit&&(
        <div className="modal-overlay">
          <div className="modal">
            <h3>✏️ עריכת {edit.name}</h3>
            <div className="fg"><label>שם</label><input className="fc" value={edit.name} onChange={e=>setEdit({...edit,name:e.target.value})}/></div>
            <div className="fg"><label>שלוחה</label><input className="fc" value={edit.ext} onChange={e=>setEdit({...edit,ext:e.target.value})}/></div>
            <div className="fg">
              <label>תפקיד</label>
              <select className="fc" value={edit.role} onChange={e=>setEdit({...edit,role:e.target.value})}>
                <option value="mgr">מנהל</option><option value="adv">יועץ</option><option value="int">מתמחה</option>
              </select>
            </div>
            <div className="fg">
              <label>מגבה (גיבוי)</label>
              <select className="fc" value={edit.backup||''} onChange={e=>setEdit({...edit,backup:e.target.value})}>
                <option value="">ללא</option>
                {employees.filter(e=>e.id!==edit.id).map(e=><option key={e.id} value={e.name}>{e.name}</option>)}
              </select>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setEdit(null)}>ביטול</button>
              <button className="btn btn-primary" onClick={saveEdit}>שמור</button>
            </div>
          </div>
        </div>
      )}
      {showAdd&&(
        <div className="modal-overlay">
          <div className="modal">
            <h3>➕ עובד חדש</h3>
            <div className="fg"><label>שם</label><input className="fc" value={newE.name} onChange={e=>setNewE({...newE,name:e.target.value})} placeholder="שם מלא"/></div>
            <div className="fg"><label>שלוחה</label><input className="fc" value={newE.ext} onChange={e=>setNewE({...newE,ext:e.target.value})}/></div>
            <div className="fg">
              <label>תפקיד</label>
              <select className="fc" value={newE.role} onChange={e=>setNewE({...newE,role:e.target.value})}>
                <option value="mgr">מנהל</option><option value="adv">יועץ</option><option value="int">מתמחה</option>
              </select>
            </div>
            <div className="fg">
              <label>מגבה</label>
              <select className="fc" value={newE.backup||''} onChange={e=>setNewE({...newE,backup:e.target.value})}>
                <option value="">ללא</option>
                {employees.map(e=><option key={e.id} value={e.name}>{e.name}</option>)}
              </select>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>ביטול</button>
              <button className="btn btn-primary" disabled={!newE.name} onClick={addEmp}>הוסף</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════
   APP ROOT
════════════════════════════════════ */
function App(){
  const[employees,setEmployees]=useState(()=>LS.get('emp_v4',RAW_EMPLOYEES));
  const[weeks,setWeeks]=useState(()=>LS.get('weeks_v4',{}));
  const[duties,setDuties]=useState(()=>LS.get('duties_v4',{}));
  const[curWeek,setCurWeek]=useState(()=>thisWeekSunday());
  const[tab,setTab]=useState('schedule');
  const[isAdmin,setIsAdmin]=useState(true);
  const[weekModal,setWeekModal]=useState(false);
  const[newWKey,setNewWKey]=useState('');

  useEffect(()=>LS.set('emp_v4',employees),[employees]);

  const schedule=weeks[curWeek]||{};
  const today=thisWeekSunday();
  const weekDuties=duties[curWeek]||(() => {
    const d={};
    DAYS.forEach((_,di)=>{d[di]={};DUTY_TYPES.forEach((_,dti)=>{d[di][dti]=DEFAULT_DUTIES[di]?.[dti]||'';});});
    return d;
  })();

  const setSchedule=upd=>setWeeks(prev=>{
    const next={...prev,[curWeek]:typeof upd==='function'?upd(prev[curWeek]||{}):upd};
    LS.set('weeks_v4',next);return next;
  });
  const setWeekDuties=upd=>setDuties(prev=>{
    const next={...prev,[curWeek]:typeof upd==='function'?upd(prev[curWeek]||{}):upd};
    LS.set('duties_v4',next);return next;
  });
  const initWeek=(key,fromKey)=>{
    setWeeks(prev=>{
      const base=fromKey&&prev[fromKey]?JSON.parse(JSON.stringify(prev[fromKey])):buildDefault(employees);
      const next={...prev,[key]:base};LS.set('weeks_v4',next);return next;
    });
    setCurWeek(key);
  };
  const autoGen=()=>{
    if(!window.confirm('לאפס לסידור ברירת מחדל?'))return;
    setSchedule(buildDefault(employees));
  };
  const handleGenerated=(sched)=>{
    setSchedule(sched);
    setTab('schedule');
  };

  const weekList=[...new Set([curWeek,...Object.keys(weeks)])].sort().reverse();

  const TABS=[
    ['schedule','📅 סידור'],
    ['constraints','🤖 אילוצים וייצור אוטומטי'],
    ['summary','📊 סיכום'],
    ...(isAdmin?[['admin','⚙️ ניהול']]:[])
  ];

  return(
    <div>
      {/* HEADER */}
      <div className="header">
        <div className="header-left">
          <div className="logo-icon">📊</div>
          <div className="logo-text"><h1>מרכז יועצי השקעות</h1><span>מערכת סידור עבודה שבועי</span></div>
        </div>
        <div className="header-right">
          <span style={{fontSize:11,padding:'3px 8px',borderRadius:4,fontWeight:700,
            background:isAdmin?'rgba(124,106,247,.2)':'rgba(79,142,247,.15)',
            color:isAdmin?'#a090ff':'#6aabff'}}>
            {isAdmin?'🔐 מנהל':'👤 משתמש'}
          </span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setIsAdmin(!isAdmin)}>{isAdmin?'מצב משתמש':'מצב מנהל'}</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>window.print()}>🖨️</button>
          <button className="btn btn-success btn-sm" onClick={()=>exportToExcel(employees,schedule,curWeek)}>📥 Excel</button>
        </div>
      </div>

      {/* WEEK BAR */}
      <div className="week-bar">
        <select className="week-select" value={curWeek} onChange={e=>setCurWeek(e.target.value)}>
          {weekList.map(wk=><option key={wk} value={wk}>{weekLabel(wk)}{wk===today?' (השבוע)':''}</option>)}
        </select>
        <span className="week-badge">{weekLabel(curWeek)}</span>
        <button className="btn btn-primary btn-sm" onClick={()=>setWeekModal(true)}>+ שבוע חדש</button>
        {weeks[curWeek]&&<button className="btn btn-ghost btn-sm" onClick={()=>initWeek(curWeek,curWeek)}>🔁 שכפל</button>}
        <button className="btn btn-warning btn-sm" onClick={autoGen}>⚡ ברירת מחדל</button>
      </div>

      {/* LEGEND */}
      <div className="legend">
        {[['#2e3460','☀️ בוקר'],['#1a5fa0','🏠 WFH'],['#2a2e50','🌙 ערב'],
          ['#8a6800','🌴 חופש'],['#8a2020','🤒 מחלה'],['#6a5000','🪖 מילואים'],['#161828','➖ חופשי']
        ].map(([bg,lbl])=>(
          <div key={lbl} className="legend-item"><span className="ldot" style={{background:bg}}></span>{lbl}</div>
        ))}
      </div>

      {/* TABS */}
      <div className="tabs">
        {TABS.map(([k,l])=>(
          <div key={k} className={`tab ${tab===k?'tab-on':'tab-off'}`} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>

      {/* CONTENT */}
      {!weeks[curWeek]&&tab==='schedule'?(
        <div style={{padding:'20px'}}>
          <div className="empty">
            <div className="eicon">📅</div>
            <div style={{marginBottom:14}}>אין סידור לשבוע זה</div>
            <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
              <button className="btn btn-primary" onClick={()=>initWeek(curWeek,null)}>⚡ ייצר סידור ברירת מחדל</button>
              {weekList.length>1&&<button className="btn btn-ghost" onClick={()=>initWeek(curWeek,weekList.find(w=>w!==curWeek))}>🔁 שכפל מהשבוע הקודם</button>}
              <button className="btn btn-teal" onClick={()=>setTab('constraints')}>🤖 ייצר לפי אילוצים</button>
            </div>
          </div>
        </div>
      ):(
        <>
          {tab==='schedule'&&<ScheduleTab employees={employees} schedule={schedule} setSchedule={setSchedule} duties={weekDuties} setDuties={setWeekDuties}/>}
          {tab==='constraints'&&<ConstraintsTab employees={employees} onGenerate={handleGenerated}/>}
          {tab==='summary'&&<SummaryTab employees={employees} schedule={schedule}/>}
          {tab==='admin'&&isAdmin&&<AdminTab employees={employees} setEmployees={setEmployees}/>}
        </>
      )}

      {/* WEEK MODAL */}
      {weekModal&&(
        <div className="modal-overlay">
          <div className="modal">
            <h3>📅 שבוע חדש</h3>
            <div className="fg"><label>תאריך ראשון בשבוע (ראשון)</label>
              <input className="fc" type="date" value={newWKey} onChange={e=>setNewWKey(e.target.value)}/>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setWeekModal(false)}>ביטול</button>
              <button className="btn btn-primary" disabled={!newWKey}
                onClick={()=>{initWeek(newWKey,curWeek);setWeekModal(false);}}>צור</button>
            </div>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <div className="footer">
        © כל הזכויות שמורות לאלעד | מערכת סידור עבודה - מרכז יועצי השקעות
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
